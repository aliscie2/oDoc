name: Deploy to GitHub Pages

on:
  push:
    branches: [dev2, main]
  pull_request:
    branches: [dev2, main]

env:
  NODE_VERSION: "24.4.1"
  # Only include environment variables needed for frontend build
  VITE_DFX_NETWORK: staging
  VITE_TEST_ENV: backend
  # AI API Keys (for frontend)
  VITE_ANTHROPIC_API_KEY: ${{ secrets.VITE_ANTHROPIC_API_KEY }}
  VITE_ANTHROPIC_SECRET_KEY: ${{ secrets.VITE_ANTHROPIC_SECRET_KEY }}
  VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
  VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
  VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
  VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
  VITE_DEEPSEEK_API_KEY: ${{ secrets.VITE_DEEPSEEK_API_KEY }}
  VITE_HUGING_FACE_TOKEN: ${{ secrets.VITE_HUGING_FACE_TOKEN }}
  # Email Services
  VITE_REACT_APP_EMAILJS_SERVICE_ID: ${{ secrets.VITE_REACT_APP_EMAILJS_SERVICE_ID }}
  VITE_REACT_APP_EMAILJS_USER_ID: ${{ secrets.VITE_REACT_APP_EMAILJS_USER_ID }}
  VITE_REACT_APP_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_REACT_APP_EMAILJS_TEMPLATE_ID }}
  VITE_GMAIL_AUTH_CLIENT_ID: ${{ secrets.VITE_GMAIL_AUTH_CLIENT_ID }}
  VITE_MAILGUN_KEY: ${{ secrets.VITE_MAILGUN_KEY }}
  VITE_MAINGUN_SECRET_KEY: ${{ secrets.VITE_MAINGUN_SECRET_KEY }}
  VITE_MAILJET_KEY: ${{ secrets.VITE_MAILJET_KEY }}
  VITE_MAILJET_SECRET_KEY: ${{ secrets.VITE_MAILJET_SECRET_KEY }}
  VITE_BREVO_SECRET_KEY: ${{ secrets.VITE_BREVO_SECRET_KEY }}
  VITE_MAIL_TRAP: ${{ secrets.VITE_MAIL_TRAP }}
  # Communication & Monitoring
  VITE_PUBLIC_TELEGRAM_BOT_TOKEN: ${{ secrets.VITE_PUBLIC_TELEGRAM_BOT_TOKEN }}
  VITE_SENTRY_DNS: ${{ secrets.VITE_SENTRY_DNS }}

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
            
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'
          
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache
        
      - name: Build frontend
        run: yarn build
        
      - name: Setup Pages
        if: github.event_name == 'push'
        uses: actions/configure-pages@v4
        
      - name: Upload to Pages
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'
          
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/dev2' || github.ref == 'refs/heads/main')
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Comment PR with preview info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Frontend build completed** - Pages will deploy when merged to dev2 or main\n\nThis is a fast frontend-only build. Backend tests and canister deployment run separately.`
            })